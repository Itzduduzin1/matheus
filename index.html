<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-books</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* =====================================================
     NÃO EDITE ESTE ARQUIVO — edite config.js e i18n.js
     As cores são injetadas via JS a partir do config.js
  ===================================================== */

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent:        #6d28d9;
    --accent-deep:   #3b0066;
    --accent-soft:   #8b5cf6;

    --bg:            #ffffff;
    --bg-card:       #ffffff;
    --bg-stats:      #ffffff;
    --bg-pill:       #f5f3ff;
    --bg-icon:       #f5f3ff;
    --bg-social:     #ffffff;

    --ink:           #1a0a2e;
    --muted:         #7c6fa0;
    --bio-color:     #5a4a7a;

    --border:        rgba(109,40,217,0.12);
    --border-strong: rgba(109,40,217,0.28);
    --sep:           rgba(109,40,217,0.15);

    --shadow-sm:     0 2px 14px rgba(59,0,102,0.07);
    --shadow-md:     0 8px 32px rgba(59,0,102,0.13);

    --split-left:    #ffffff;
    --split-right:   #ede9ff;
    --split-angle:   118deg;
    --split-ratio:   54%;

    --toggle-bg:     #f5f3ff;
    --toggle-border: rgba(109,40,217,0.2);
  }

  [data-theme="dark"] {
    --bg:            #0e0820;
    --bg-card:       #1a1030;
    --bg-stats:      #1a1030;
    --bg-pill:       rgba(109,40,217,0.18);
    --bg-icon:       rgba(109,40,217,0.15);
    --bg-social:     #1a1030;

    --ink:           #f0eaff;
    --muted:         #9b8bbf;
    --bio-color:     #b8a8d8;

    --border:        rgba(168,85,247,0.15);
    --border-strong: rgba(168,85,247,0.35);
    --sep:           rgba(168,85,247,0.2);

    --shadow-sm:     0 2px 14px rgba(0,0,0,0.3);
    --shadow-md:     0 8px 32px rgba(0,0,0,0.45);

    --split-left:    #0e0820;
    --split-right:   #180d34;

    --toggle-bg:     rgba(168,85,247,0.15);
    --toggle-border: rgba(168,85,247,0.3);
  }

  body {
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex; justify-content: center; align-items: flex-start;
    padding: 0 16px 80px;
    color: var(--ink);
    overflow-x: hidden;
    transition: color 0.45s;
  }

  .bg-split {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(
      var(--split-angle),
      var(--split-left)  0%,
      var(--split-left)  var(--split-ratio),
      var(--split-right) var(--split-ratio),
      var(--split-right) 100%
    );
    transition: background 0.45s;
  }
  .bg-glow {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 90% 55% at 30% -5%, rgba(109,40,217,0.13) 0%, transparent 65%),
      radial-gradient(ellipse 55% 45% at 85% 95%, rgba(139,92,246,0.18) 0%, transparent 60%);
  }

  /* ── CONTROLES (tema + idioma) ── */
  .controls {
    position: fixed; top: 16px; right: 16px; z-index: 200;
    display: flex; gap: 8px; align-items: center;
  }

  .lang-selector {
    display: flex; gap: 4px; align-items: center;
    background: var(--toggle-bg); border: 1px solid var(--toggle-border);
    border-radius: 12px; padding: 4px 6px;
    transition: background 0.45s, border-color 0.45s;
  }
  .lang-btn {
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    padding: 4px 8px; border-radius: 8px; border: none; background: none;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .lang-btn.active {
    background: var(--accent); color: #fff;
    box-shadow: 0 2px 8px rgba(109,40,217,0.3);
  }
  .lang-btn:hover:not(.active) { color: var(--ink); }

  .theme-toggle {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--toggle-bg); border: 1px solid var(--toggle-border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; outline: none;
    box-shadow: var(--shadow-sm);
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1), background 0.45s, border-color 0.45s;
  }
  .theme-toggle:hover { transform: scale(1.1) rotate(10deg); }

  /* ── CONTAINER ── */
  .container { width: 100%; max-width: 440px; position: relative; z-index: 1; padding-top: 72px; }

  /* ── PROFILE ── */
  .profile { text-align: center; margin-bottom: 32px; animation: fadeUp 0.7s ease both; }
  .avatar-wrap { display: inline-block; position: relative; margin-bottom: 18px; }
  .avatar {
    width: 92px; height: 92px; border-radius: 50%;
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 2px var(--border-strong), var(--shadow-md);
    overflow: hidden; position: relative;
    transition: border-color 0.45s, box-shadow 0.45s;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .avatar::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: linear-gradient(135deg, rgba(109,40,217,0.15) 0%, transparent 55%);
  }
  .avatar-ring {
    position: absolute; inset: -8px; border-radius: 50%;
    border: 1.5px dashed var(--border-strong);
    animation: spin 14s linear infinite; transition: border-color 0.45s;
  }
  .avatar-ring::before {
    content: ''; position: absolute;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    top: 50%; left: -3.5px; transform: translateY(-50%);
    box-shadow: 0 0 10px rgba(109,40,217,0.7);
    transition: background 0.45s;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .verified-badge {
    position: absolute; bottom: 2px; right: 2px;
    width: 22px; height: 22px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    border: 2px solid var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; z-index: 2; color: #fff; font-weight: 700;
    transition: border-color 0.45s;
  }

  .profile-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px;
    background: linear-gradient(135deg, var(--accent-deep) 0%, var(--accent) 60%, var(--accent-soft) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .profile-handle { color: var(--muted); font-size: 13px; margin-bottom: 14px; transition: color 0.45s; }
  .profile-bio { font-size: 13.5px; color: var(--bio-color); line-height: 1.65; max-width: 290px; margin: 0 auto; transition: color 0.45s; }
  .profile-bio strong { color: var(--accent); font-weight: 600; }

  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--bg-pill); border: 1px solid var(--border);
    border-radius: 100px; padding: 5px 14px;
    font-size: 11px; font-weight: 600; color: var(--accent);
    margin-top: 14px; letter-spacing: 0.3px;
    transition: all 0.45s;
  }

  /* ── STATS ── */
  .stats {
    display: flex; margin: 0 0 32px;
    background: var(--bg-stats); border: 1px solid var(--border);
    border-radius: 18px; box-shadow: var(--shadow-sm); overflow: hidden;
    animation: fadeUp 0.7s 0.1s ease both;
    transition: background 0.45s, border-color 0.45s;
  }
  .stat { flex: 1; text-align: center; padding: 18px 12px; position: relative; }
  .stat + .stat::before {
    content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
    width: 1px; background: var(--border); transition: background 0.45s;
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent-deep), var(--accent-soft));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 0.8px; text-transform: uppercase; font-weight: 500; transition: color 0.45s; }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 10.5px; font-weight: 700; letter-spacing: 1.8px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 12px; padding-left: 2px;
    display: flex; align-items: center; gap: 8px; transition: color 0.45s;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--sep), transparent); }

  /* ── CARDS ── */
  .cards { display: flex; flex-direction: column; gap: 10px; }
  .ebook-group { margin-bottom: 8px; }

  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 18px; padding: 16px 18px;
    display: flex; align-items: center; gap: 14px;
    text-decoration: none; color: var(--ink);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1),
                box-shadow 0.3s, border-color 0.3s, background 0.45s, color 0.45s;
    position: relative; overflow: hidden; cursor: pointer;
    box-shadow: var(--shadow-sm);
    animation: fadeUp 0.6s ease both;
  }
  .card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; border-radius: 0 2px 2px 0;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    opacity: 0; transition: opacity 0.25s;
  }
  .card:hover { border-color: var(--border-strong); transform: translateY(-3px); box-shadow: var(--shadow-md); }
  .card:hover::before { opacity: 1; }

  [data-theme="light"] .card.premium { background: linear-gradient(135deg, #fff 60%, #f5f3ff); }
  [data-theme="dark"]  .card.premium { background: linear-gradient(135deg, #1e1238 60%, #241648); }
  .card.premium { border-color: var(--border-strong); }
  .card.premium::before { background: linear-gradient(180deg, #c4a000, #f0d060); }

  .card-icon {
    width: 46px; height: 46px; border-radius: 13px;
    background: var(--bg-icon);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), background 0.45s;
  }
  [data-theme="light"] .card.premium .card-icon { background: linear-gradient(135deg, #fef9e7, #fdf0c8); }
  [data-theme="dark"]  .card.premium .card-icon { background: linear-gradient(135deg, rgba(70,52,0,0.7), rgba(90,65,0,0.7)); }
  .card:hover .card-icon { transform: scale(1.1) rotate(-4deg); }

  .card-content { flex: 1; min-width: 0; }
  .card-title { font-weight: 600; font-size: 14px; margin-bottom: 3px; line-height: 1.35; }
  .card-sub { font-size: 11px; color: var(--muted); transition: color 0.45s; }

  .card-right { text-align: right; flex-shrink: 0; }
  .card-price {
    font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent-deep), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .arrow { font-size: 11px; color: var(--muted); opacity: 0; transform: translateX(-4px); transition: all 0.2s; margin-top: 4px; }
  .card:hover .arrow { opacity: 1; transform: translateX(0); }

  .badge {
    position: absolute; top: 0; right: 14px;
    font-size: 9px; font-weight: 700; padding: 4px 10px;
    border-radius: 0 0 8px 8px; letter-spacing: 0.8px; text-transform: uppercase; z-index: 2;
    background: linear-gradient(135deg, #b8960a, #e8c83a);
    color: #fff; box-shadow: 0 2px 8px rgba(184,150,10,0.35);
  }

  /* ── SEPARATOR ── */
  .group-sep {
    border: none; height: 1px;
    background: linear-gradient(90deg, transparent, var(--sep), transparent);
    margin: 22px 0; transition: background 0.45s;
  }

  /* ── SOCIALS ── */
  .socials { display: flex; justify-content: center; gap: 12px; margin-bottom: 28px; animation: fadeUp 0.6s 0.5s ease both; }
  .social-btn {
    height: 46px; padding: 0 20px; border-radius: 14px;
    background: var(--bg-social); border: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 500; color: var(--ink);
    text-decoration: none;
    transition: all 0.28s cubic-bezier(0.34,1.56,0.64,1), background 0.45s, border-color 0.45s, color 0.45s;
    box-shadow: var(--shadow-sm);
  }
  .social-btn:hover { border-color: var(--border-strong); transform: translateY(-3px); box-shadow: var(--shadow-md); }
  .social-btn .icon { font-size: 16px; }

  /* ── FOOTER ── */
  .footer {
    text-align: center; font-size: 11px; color: var(--muted);
    animation: fadeUp 0.6s 0.6s ease both;
    display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap;
    transition: color 0.45s;
  }
  .footer a { color: var(--accent-soft); text-decoration: none; font-weight: 500; }
  .footer-dot { opacity: 0.4; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="bg-split"></div>
<div class="bg-glow"></div>

<!-- Controles: idioma + tema -->
<div class="controls">
  <div class="lang-selector" id="langSelector"></div>
  <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>
</div>

<!-- Conteúdo gerado pelo JS -->
<div class="container" id="app"></div>

<!-- =====================================================
     SCRIPTS — NÃO EDITE ABAIXO (só se souber o que faz)
===================================================== -->
<script src="config.js"></script>
<script src="i18n.js"></script>
<script>
  /* ── Estado ── */
  let currentLang  = SITE_CONFIG.defaultLang;
  let currentTheme = SITE_CONFIG.theme.defaultMode;

  /* ── Utilitários ── */
  const t = (key) => (I18N[currentLang] || I18N["pt-BR"])[key] || key;
  const $ = (id) => document.getElementById(id);

  /* ── Aplicar variáveis CSS do config.js ── */
  function applyThemeVars() {
    const th = SITE_CONFIG.theme;
    const root = document.documentElement;
    root.style.setProperty('--accent',       th.accentColor);
    root.style.setProperty('--accent-deep',  th.accentDeep);
    root.style.setProperty('--accent-soft',  th.accentSoft);
    root.style.setProperty('--split-angle',  th.splitAngle);
    root.style.setProperty('--split-ratio',  th.splitRatio);
  }

  /* ── Tema ── */
  function toggleTheme() {
    currentTheme = currentTheme === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    $('themeBtn').textContent = currentTheme === 'dark' ? '☀️' : '🌙';
    try { localStorage.setItem('theme', currentTheme); } catch(e) {}
  }

  function initTheme() {
    try { const s = localStorage.getItem('theme'); if (s) currentTheme = s; } catch(e) {}
    document.documentElement.setAttribute('data-theme', currentTheme);
    $('themeBtn').textContent = currentTheme === 'dark' ? '☀️' : '🌙';
  }

  /* ── Idioma ── */
  function setLang(lang) {
    currentLang = lang;
    document.documentElement.setAttribute('lang', lang);
    try { localStorage.setItem('lang', lang); } catch(e) {}
    renderLangSelector();
    renderApp();
  }

  function initLang() {
    try { const s = localStorage.getItem('lang'); if (s && I18N[s]) currentLang = s; } catch(e) {}
    document.documentElement.setAttribute('lang', currentLang);
  }

  function renderLangSelector() {
    if (!SITE_CONFIG.showLangSelector) { $('langSelector').style.display='none'; return; }
    $('langSelector').innerHTML = AVAILABLE_LANGS.map(lang => `
      <button class="lang-btn ${lang === currentLang ? 'active' : ''}" onclick="setLang('${lang}')">
        ${(I18N[lang] || {}).lang_name || lang}
      </button>
    `).join('');
  }

  /* ── RENDER PRINCIPAL ── */
  function renderApp() {
    const cfg = SITE_CONFIG;
    const p   = cfg.profile;

    /* ── Avatar ── */
    const avatarHtml = `
      <div class="avatar-wrap">
        <div class="avatar">
          <img src="${p.avatar}" alt="${p.name}" onerror="this.style.display='none'">
        </div>
        <div class="avatar-ring"></div>
        ${p.verified ? '<div class="verified-badge">✓</div>' : ''}
      </div>
    `;

    /* ── Stats ── */
    const statsHtml = cfg.stats.map(s => `
      <div class="stat">
        <div class="stat-num">${s.value}</div>
        <div class="stat-label">${t(s.labelKey)}</div>
      </div>
    `).join('');

    /* ── Grupos de produtos ── */
    const groupsHtml = cfg.groups.map((group, gi) => {
      const cardsHtml = group.products.map((prod, pi) => `
        <a class="card ${prod.premium ? 'premium' : ''}" href="${prod.url}" target="_blank"
           style="animation-delay:${0.12 + pi * 0.08}s">
          ${prod.premium ? `<div class="badge">${t('badge_premium')}</div>` : ''}
          <div class="card-icon">${prod.icon}</div>
          <div class="card-content">
            <div class="card-title">${t(prod.titleKey)}</div>
            <div class="card-sub">${t(prod.subtitleKey)}</div>
          </div>
          <div class="card-right">
            <div class="card-price">${prod.price}</div>
            <div class="arrow">→</div>
          </div>
        </a>
      `).join('');

      return `
        ${gi > 0 ? '<hr class="group-sep">' : ''}
        <p class="section-label">${group.icon} ${t(group.titleKey)}</p>
        <div class="ebook-group">
          <div class="cards">${cardsHtml}</div>
        </div>
      `;
    }).join('');

    /* ── Redes sociais ── */
    const socialsHtml = cfg.socials.map(s => `
      <a class="social-btn" href="${s.url}" target="_blank">
        <span class="icon">${s.icon}</span> ${s.label}
      </a>
    `).join('');

    /* ── HTML final ── */
    $('app').innerHTML = `
      <div class="profile">
        ${avatarHtml}
        <h1 class="profile-name">${p.name}</h1>
        <p class="profile-handle">${p.handle}</p>
        <p class="profile-bio">${p.bio[currentLang] || p.bio["pt-BR"]}</p>
        <div class="pill">${t('pill_secure')}</div>
      </div>

      <div class="stats">${statsHtml}</div>

      ${groupsHtml}

      <hr class="group-sep">
      <p class="section-label" style="justify-content:center;">${t('section_follow')}</p>
      <div class="socials">${socialsHtml}</div>

      <div class="footer">
        <span>${t('footer_made')} <strong>${cfg.footer.madeBy}</strong></span>
        <span class="footer-dot">·</span>
        <span>${t('footer_payment')} <a href="${cfg.footer.paymentUrl}" target="_blank">${cfg.footer.paymentLabel}</a></span>
      </div>
    `;

    /* Atualiza título */
    document.title = `${p.name} · E-books`;
  }

  /* ── INIT ── */
  applyThemeVars();
  initTheme();
  initLang();
  renderLangSelector();
  renderApp();
</script>
</body>
</html>
